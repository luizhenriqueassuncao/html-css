<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags em HTML</title>
</head>
<body>
    <h1>Tags em HTML </h1>
    <p> Em HTML5 podemos colocar esses elementos que estão na lista. passe o mouse sobre eles para descobrir a tag.</p>
    <ul type="square"> 
        <li><abbr title="tag p">Parágrafo</abbr></li>
        <abbr title="tag h1">
            <li>títulos</li>
        </abbr>
        <li><abbr title="tag img">Imagens</abbr></li>
            <li><abbr title="tag abbr">abreviações</abbr></li>
        <li><abbr title=" tag code">Códigos Fontes</abbr></li>
        <li><abbr title="tag ol e li">Listas Numeradas</abbr></li>
        <li><abbr title="tag ul e li">lista com demarcadores</abbr></li>
    </ul>
</body>
</html>
