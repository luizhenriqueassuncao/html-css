<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>links</title>
  <style>
    body{
      font-family: Arial, Helvetica, sans-serif;

    }
    a{
      color:red;
      text-decoration: none;
      font-weight: bold;
    }
    a:visited{
      color: darkred;
    }
    a:hover{
      text-decoration: underline;
      color: black;
    }
    a:active{
      color: rgb(57, 181, 57);
    }
    .especial::before{
      content: "⇒";
    }
    .especial::after{
      content: "⇐";

    }
    .especial{
      background-color: lightgreen;
      width: 154px;

    }
  </style>

</head>
<body>
  <h1>Personalizando Links</h1>
  <ul>
    <li><a href="https://gustavoguanabara.github.io">Repositório do GtHub</a></li>
    <li class="especial"><a href="https://youtube.com/cursoemvídeo/">CanaldoYoutube</a></li>
    <li><a href="https://www.cursoemvideo.com">Site do Curso em Vídeo</a></li>
  </ul>
</body>
</html>
