<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>modelo de caixa</title>
  <style>
    h1{
      height: 300px;
      width: 300px;
      background-color: lightsteelblue;
     
      border: 10px solid crimson;
      padding: 10px 10px 1px 21px;
        margin: 20px auto 40px auto ;
      outline: 5px groove darkorchid

      }

     a{
      border-width: 10px;
      border-style: solid;
      border-color: yellow;
       padding-top: 10px;
      padding-right: 10px;
      padding-bottom: 5px;padding-left: 21px;
    }
  </style>
</head>
<body>
  <h1>Exemplo de caixa box-level</h1>
  <p>paragrafos são exemplo de box-level,e os links <a href="#">são exemplo de inline-level</a></p>
</body>
</html>
