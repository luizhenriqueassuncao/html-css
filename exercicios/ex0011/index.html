<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem Dinamica</h1>
    <p>Tente abrir esse site em vários despositivos diferentes ou diminua o navegador.</p>

    <picture>
        <source media="(max-width:750px)" srcset="imagens/foto.foto.png" type="image/png">
        <source media="(max-width:1050px )" srcset="imagens/foto.3.png" type="image/png">
    <img src="imagens/foto 2.png" alt="imagem flexível">
    </picture>
    <h1>Reproduzindo Àudios</h1>
    <p>reproduzindo audio </p>
    <audio preload="metadata"controls autoplay>
        <source src="mídia/audio mp3.mp3" type="audio/mpeg">
        <source src="mídia/audio mp3.ogg" type="audio/ogg">
        <p>seu navegador não reproduz áudio. <a href="mídia/audio mp3.mp3">clique aqui para baixar o arquivo MP3</a></p>
    </audio>
</body>
</html>
